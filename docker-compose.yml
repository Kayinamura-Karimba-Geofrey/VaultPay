services:
  postgres:
    image: "postgres:latest"
    environment:
      - "POSTGRES_DB=vault"
      - "POSTGRES_PASSWORD=secret"
      - "POSTGRES_USER=myuser"
    ports:
      - "5432:5432"

  vault-pay:
    build: .
    ports:
      - "8081:8080"
    environment:
      - "DB_HOST=postgres"
      - "DB_NAME=vault"
      - "DB_USER=myuser"
      - "DB_PASSWORD=secret"
    depends_on:
      - postgres
